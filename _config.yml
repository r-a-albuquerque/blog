# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely need to edit after that.
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'jekyll serve'. If you change this file, please restart the server process.

# Site language
lang: pt-BR

# Site title
title: "Clipper Summer"

# A description of your site for meta tag, search engine results.
description: "só um blog comum para registrar ideias comuns"

# The subpath of your site, e.g. /blog, for generating urls.
baseurl: "/blog"

# The base hostname & protocol of your site for where absolute urls are needed.
url: "https://r-a-albuquerque.github.io"

# Favicon
favicon: images/favicon.png

# Google Analytics id, e.g. "UA-NNNNNNNN-N"
google_analytics: ""

# Site navigation - each item must have a title and a url.
navigation:
  - text: Início
    url: /
  - text: Sobre
    url: /about
  - text: Tags
    url: /tags

# The shortname for your Disqus site to enable comments.
# disqus: justgoodthemes

# Colors
accent_color: '#d7d7d7'

# Site footer
footer:
  content: "&copy; Scriptor todos os direitos reservados. Tema por [JustGoodThemes](https://www.justgoodthemes.com)."

# Plugins
plugins:
  - jekyll-paginate

# http://jekyllrb.com/docs/pagination/
paginate: 3
paginate_path: '/page:num/'


# Permalinks
permalink: /:title

# Conversion
markdown: kramdown

# Sass
sass:
  sass_dir: _sass
  style: compressed
